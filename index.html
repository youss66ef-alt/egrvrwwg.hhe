<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مفاجأة!</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        video { width: 90%; max-width: 500px; border-radius: 15px; border: 5px solid #333; display: none; margin-top: 20px; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>مرحباً بك!</h1>
    
    <button onclick="startSurprise()">اضغط هنا للمفاجأة</button>

    <video id="videoElement" autoplay playsinline></video>

    <script>
        function startSurprise() {
            // رسالة الترحيب
            alert("مبروك انت دلوقتي معاك يوسف!");

            // محاولة فتح الكاميرا الأمامية
            const video = document.getElementById('videoElement');
            
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(function(stream) {
                    video.srcObject = stream;
                    video.style.display = "inline-block"; // إظهار الفيديو بعد الحصول على الإذن
                })
                .catch(function(error) {
                    console.log("حدث خطأ في الوصول للكاميرا: " + error);
                    alert("يجب السماح بالوصول للكاميرا لتكتمل المفاجأة!");
                });
            } else {
                alert("للأسف متصفحك لا يدعم فتح الكاميرا.");
            }
        }
    </script>
</body>
</html>
